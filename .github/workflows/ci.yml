name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Release
            build_type: Release
            sanitizers: ""
            experimental: false
          - name: ASan UBSan
            build_type: Debug
            sanitizers: "address,undefined"
            experimental: false
          - name: TSan
            build_type: Debug
            sanitizers: "thread"
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            qt6-base-dev \
            qt6-base-dev-tools

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBOORUBOX_SANITIZERS="${{ matrix.sanitizers }}"

      - name: Build
        run: cmake --build build -j2

      - name: Test
        run: ctest --test-dir build --output-on-failure
